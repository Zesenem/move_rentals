\[build]
command = "npm run build"
publish = "dist"
functions = "netlify/functions"

\[\[redirects]]
from = "/\*"
to = "/index.html"
status = 200
force = false

\[\[headers]]
for = "/*"
\[headers.values]
X-Frame-Options = "DENY"
X-Content-Type-Options = "nosniff"
Referrer-Policy = "strict-origin-when-cross-origin"
Content-Security-Policy = """
default-src 'self';&#x20;
script-src 'self' 'unsafe-inline' https\://*.revolut.com https\://*.revolut.codes;&#x20;
connect-src 'self' https\://*.revolut.com https\://*.revolut.codes [https://api.twicecommerce.com](https://api.twicecommerce.com) https\://*.sentry.io;&#x20;
frame-src 'self' https\://*.revolut.com https\://*.revolut.codes [https://www.google.com](https://www.google.com);&#x20;
style-src 'self' 'unsafe-inline' [https://fonts.googleapis.com](https://fonts.googleapis.com) https\://*.revolut.com https\://*.revolut.codes;&#x20;
font-src 'self' [https://fonts.gstatic.com](https://fonts.gstatic.com);&#x20;
img-src 'self' data: https\://*.revolut.com https\://*.revolut.codes [https://firebasestorage.googleapis.com](https://firebasestorage.googleapis.com) [https://purecatamphetamine.github.io](https://purecatamphetamine.github.io);&#x20;
form-action 'self';&#x20;
base-uri 'self';&#x20;
object-src 'none';&#x20;
worker-src 'self' blob:;
"""
Permissions-Policy = "payment=(self)"
